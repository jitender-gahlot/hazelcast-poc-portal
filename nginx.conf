worker_processes auto;
pid /var/cache/nginx/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"referrer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    client_body_temp_path /var/cache/nginx/client_temp;
    proxy_temp_path       /var/cache/nginx/proxy_temp;
    fastcgi_temp_path     /var/cache/nginx/fastcgi_temp;
    uwsgi_temp_path       /var/cache/nginx/uwsgi_temp;
    scgi_temp_path        /var/cache/nginx/scgi_temp;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 1m;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    limit_req_zone $binary_remote_addr zone=frontend:10m rate=60r/m;
    limit_req_status 429;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers ───────────────────────────────────────────────
        # All add_header directives live here at server level; no location
        # block uses add_header (doing so would suppress these).
        add_header X-Frame-Options            "SAMEORIGIN"                              always;
        add_header X-Content-Type-Options     "nosniff"                                 always;
        add_header X-XSS-Protection           "1; mode=block"                           always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"         always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
            always;

        # No caching for the SPA entry point
        expires -1;
        # ──────────────────────────────────────────────────────────────────

        # Nginx health check (frontend only)
        location = /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","service":"poc-portal"}';
        }

        # API — proxy to Node.js backend
        # (no add_header here; security headers come from the server block)
        location /api/ {
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout  30s;
            proxy_connect_timeout 5s;
            proxy_send_timeout  30s;
        }

        # Static SPA
        location / {
            limit_req zone=frontend burst=20 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # Block dot-files and exploit probes
        location ~ /\. {
            deny all; access_log off; log_not_found off;
        }
        location ~* \.(php|asp|aspx|jsp|cgi|sh|py|pl)$ {
            deny all; access_log off; log_not_found off;
        }

        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"error":"Too Many Requests"}';
        }
    }
}
