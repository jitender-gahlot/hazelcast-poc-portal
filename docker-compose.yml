services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: poc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pocportal}
      POSTGRES_USER:     ${POSTGRES_USER:-pocuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pocuser} -d ${POSTGRES_DB:-pocportal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - poc-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── PostgreSQL Backup ──────────────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: poc-backup
    restart: unless-stopped
    entrypoint: ["sh", "/backup.sh"]
    environment:
      POSTGRES_DB:              ${POSTGRES_DB:-pocportal}
      POSTGRES_USER:            ${POSTGRES_USER:-pocuser}
      POSTGRES_PASSWORD:        ${POSTGRES_PASSWORD}
      BACKUP_RETAIN_DAYS:       ${BACKUP_RETAIN_DAYS:-7}
      BACKUP_INTERVAL_SECONDS:  ${BACKUP_INTERVAL_SECONDS:-21600}
    volumes:
      - ./db/backup.sh:/backup.sh:ro
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poc-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Node.js API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: poc-portal-api:latest
    container_name: poc-backend
    restart: unless-stopped
    environment:
      NODE_ENV:                 production
      PORT:                     3000
      DATABASE_URL:             postgresql://${POSTGRES_USER:-pocuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pocportal}
      JWT_SECRET:               ${JWT_SECRET:?Set JWT_SECRET in .env}
      ADMIN_REGISTRATION_CODE:  ${ADMIN_REGISTRATION_CODE:?Set ADMIN_REGISTRATION_CODE in .env}
      COOKIE_SECURE:            ${COOKIE_SECURE:-false}
      LOG_LEVEL:                ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - poc-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M

  # ── Nginx (static frontend + reverse proxy to backend) ─────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: poc-portal:latest
    container_name: poc-frontend
    restart: unless-stopped
    # Port exposed directly for local dev / non-HTTPS deployments.
    # When using Caddy (HTTPS), set HOST_PORT= (empty) in .env so this isn't
    # exposed publicly — Caddy routes to frontend:8080 internally.
    ports:
      - "${HOST_PORT:-8090}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - poc-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /var/cache/nginx:uid=1001,gid=1001,noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

  # ── Caddy (TLS termination) ────────────────────────────────────────────────
  # Handles HTTPS automatically:
  #   - DOMAIN=localhost       → self-signed cert via Caddy local CA
  #   - DOMAIN=yourdomain.com  → auto Let's Encrypt cert (server must be on 80/443)
  # To enable: set DOMAIN and TLS_EMAIL in .env, then set COOKIE_SECURE=true
  caddy:
    image: caddy:2-alpine
    container_name: poc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN:    ${DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-}
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - poc-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - https   # Only starts when: docker compose --profile https up

volumes:
  postgres_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  poc-net:
    driver: bridge
